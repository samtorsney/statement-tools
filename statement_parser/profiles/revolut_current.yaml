# Revolut standard CSV export ("Account statement" -> CSV).
#
# Source columns: Type, Product, Started Date, Completed Date, Description,
# Amount, Fee, Currency, State, Balance. Only the columns with a home in the
# canonical schema are mapped; Type/Product/Completed Date/Fee/State carry
# no canonical field and are intentionally left unmapped.
meta:
  name: revolut_current
  institution: "Revolut"
  country: IE
  source: csv

csv:
  encoding: utf-8
  delimiter: ","
  column_map:
    "Started Date": date
    "Description": description
    "Amount": amount
    "Currency": currency
    "Balance": balance

amounts:
  style: signed
  thousands: ""
  decimal: "."

dates:
  format: "%Y-%m-%d %H:%M:%S"
  fill: none

# validate is "none" (not the normally-recommended "continuity") because
# Revolut's export interleaves multiple Products (Current account, pockets/
# vaults, currency exchanges) in one file sharing a single Balance column,
# each with its own independent running balance -- so file-wide running-
# balance continuity is not a valid invariant for this source: balances
# legitimately jump at every product boundary. The balance is still
# captured, just not continuity-checked. Prefer validate: continuity for
# any source whose file tracks a single account's running balance
# (see profiles/boi_current.yaml).
balance:
  present: true
  validate: none

skip_rows: []
